<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Install</title>
<style>
  :root { color-scheme: dark; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #000; color: #fff; margin: 0;
    display: flex; min-height: 100vh; align-items: center; justify-content: center;
  }
  .card { text-align: center; padding: 32px; max-width: 360px; }
  h1 { font-size: 22px; margin: 0 0 8px; }
  p { color: #8e8e93; font-size: 14px; line-height: 1.4; }
  a.btn {
    display: inline-block; margin-top: 24px; padding: 16px 28px;
    background: #0a84ff; color: #fff; text-decoration: none;
    border-radius: 14px; font-size: 17px; font-weight: 600;
  }
  code { color: #5ac8fa; word-break: break-all; font-size: 12px; }
</style>
</head>
<body>
  <div class="card">
    <h1 id="title">Install</h1>
    <p id="sub">Tap the button, then confirm the install on your Home Screen.</p>
    <a id="install" class="btn" href="#">Install</a>
    <p style="margin-top:28px">After it installs, trust the certificate at<br>
      <b>Settings → General → VPN &amp; Device Management</b>.</p>
    <p id="err"></p>
  </div>
<script>
  const params = new URLSearchParams(location.search);
  const manifest = params.get('manifest');
  const name = params.get('name');
  if (name) {
    document.getElementById('title').textContent = 'Install ' + name;
  }
  const btn = document.getElementById('install');
  if (manifest) {
    btn.href = 'itms-services://?action=download-manifest&url=' + encodeURIComponent(manifest);
  } else {
    btn.style.display = 'none';
    document.getElementById('err').innerHTML =
      'No manifest specified. Use <code>?manifest=&lt;https url to manifest.plist&gt;</code>.';
  }
</script>
</body>
</html>
