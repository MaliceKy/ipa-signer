<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IPA Signer</title>
  <link rel="stylesheet" href="ipa-tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #e8e8ec; overflow: hidden; }
    * { box-sizing: border-box; }
    #root { height: 100%; }
    #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, system-ui, sans-serif; color: #8e8e93; font-size: 14px; }
  </style>
</head>
<body>
  <div id="boot">Loading IPA Signer…</div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ipa-icons.jsx"></script>
  <script type="text/babel" src="ipa-data.jsx"></script>
  <script type="text/babel" src="ipa-ui.jsx"></script>
  <script type="text/babel" src="ipa-ui2.jsx"></script>
  <script type="text/babel" src="ipa-screens.jsx"></script>
  <script type="text/babel" src="ipa-screens2.jsx"></script>
  <script type="text/babel" src="ipa-sign.jsx"></script>
  <script type="text/babel" src="ipa-app.jsx"></script>
  <script>
    // hide boot text once React mounts
    const _boot = document.getElementById('boot');
    const _obs = new MutationObserver(() => { if (document.getElementById('root').children.length) { _boot.style.display = 'none'; _obs.disconnect(); } });
    _obs.observe(document.getElementById('root'), { childList: true });
  </script>
</body>
</html>
